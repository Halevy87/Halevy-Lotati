name: CI

on:
  push:
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: halevy
          POSTGRES_PASSWORD: halevy
          POSTGRES_DB: halevy_test
        ports:
          - 5544:5432
        options: >-
          --health-cmd "pg_isready -U halevy"
          --health-interval 5s --health-timeout 5s --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -q
        env:
          TEST_DATABASE_URL: postgresql+psycopg2://halevy:halevy@localhost:5544/halevy_test

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - run: npx playwright install --with-deps chromium webkit
      - run: npm run test:e2e
